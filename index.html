<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Leoncio Pescia">
<title>Leoncio Pescia</title>
<style>
:root {
  --green:#16a34a;--green-bg:#dcfce7;--green-t:#15803d;
  --red:#dc2626;--red-bg:#fee2e2;--red-t:#b91c1c;
  --amber-bg:#fef3c7;--amber-t:#b45309;
  --blue:#2563eb;--blue-bg:#dbeafe;--blue-t:#1d4ed8;
  --gray:#6b7280;--gray-bg:#f3f4f6;--border:#e5e7eb;
  --surf:#fff;--page:#f9fafb;--text:#111827;--text2:#6b7280;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--page);color:var(--text);min-height:100vh}

.topbar{background:var(--surf);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
.escudo{width:36px;height:36px;border-radius:50%;background:var(--blue-bg);color:var(--blue-t);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--text2)}

.content{padding:16px;max-width:480px;margin:0 auto;padding-bottom:40px}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.stat-val{font-size:20px;font-weight:700}
.green{color:var(--green-t)}.red{color:var(--red-t)}.amber{color:var(--amber-t)}

.superavit{background:var(--green-bg);border:1px solid #bbf7d0;border-radius:var(--r);padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.superavit-label{font-size:13px;color:var(--green-t);font-weight:500}
.superavit-val{font-size:16px;font-weight:700;color:var(--green-t)}

.progress-wrap{margin-bottom:14px}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.progress-bar{height:8px;background:var(--gray-bg);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}

.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:var(--r);background:var(--surf);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center}
.tab.active{background:var(--blue-bg);border-color:#93c5fd;color:var(--blue-t)}

.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2)}
#search{width:100%;padding:10px 10px 10px 36px;border:1px solid var(--border);border-radius:var(--r);background:var(--surf);font-size:15px;color:var(--text);outline:none}

.player-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.player-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-user-select:none}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.avatar.pagado{background:var(--green-bg);color:var(--green-t)}
.avatar.pendiente{background:var(--red-bg);color:var(--red-t)}
.avatar.parcial{background:var(--amber-bg);color:var(--amber-t)}
.player-info{flex:1;min-width:0}
.player-name{font-size:15px;font-weight:600}
.player-detail{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge.pagado{background:var(--green-bg);color:var(--green-t)}
.badge.pendiente{background:var(--red-bg);color:var(--red-t)}
.badge.parcial{background:var(--amber-bg);color:var(--amber-t)}

.action-btn{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surf);font-size:14px;font-weight:500;cursor:pointer;color:var(--text2);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
.action-btn.accent{border-color:#93c5fd;background:var(--blue-bg);color:var(--blue-t)}

/* Modal / bottom sheet */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:20;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--surf);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sheet-title{font-size:17px;font-weight:700}
.close-btn{background:var(--gray-bg);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surf);font-size:15px;color:var(--text);font-family:inherit;outline:none;margin-bottom:10px}

.mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mini-stat{background:var(--page);border-radius:8px;padding:10px}
.mini-stat .label{font-size:11px;color:var(--text2)}
.mini-stat .val{font-size:17px;font-weight:700;margin-top:2px}

/* Payment history */
.hist-section{margin-top:16px}
.hist-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.hist-empty{font-size:13px;color:var(--text2);padding:8px 0}
.hist-item{background:var(--page);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.hist-item-info{flex:1;min-width:0}
.hist-item-monto{font-size:14px;font-weight:700;color:var(--text)}
.hist-item-det{font-size:12px;color:var(--text2);margin-top:2px}
.hist-actions{display:flex;gap:6px;flex-shrink:0}
.hist-edit-btn,.hist-del-btn{border:none;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px;font-family:inherit}
.hist-edit-btn{background:var(--blue-bg);color:var(--blue-t)}
.hist-del-btn{background:var(--red-bg);color:var(--red-t)}

.btn-row{display:flex;gap:8px;margin-top:10px}
.btn{flex:1;padding:12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surf);font-size:15px;font-weight:500;cursor:pointer;color:var(--text);font-family:inherit}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.danger{background:var(--red-bg);border-color:#fca5a5;color:var(--red-t)}
.btn.success{background:var(--green-bg);border-color:#86efac;color:var(--green-t)}

.complete-box{background:var(--green-bg);border-radius:var(--r);padding:10px 12px;font-size:14px;font-weight:600;color:var(--green-t);text-align:center;margin-bottom:10px}
.info-box{background:var(--blue-bg);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--blue-t);margin-bottom:12px;line-height:1.5}
.export-info{background:var(--amber-bg);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--amber-t);margin-bottom:12px;line-height:1.6}
.empty{text-align:center;padding:2rem;color:var(--text2);font-size:14px}
.divider{height:1px;background:var(--border);margin:14px 0}
</style>
</head>
<body>

<div class="topbar">
  <div class="escudo">LP</div>
  <div>
    <div class="topbar-title">Leoncio Pescia</div>
    <div class="topbar-sub">Inscripción al torneo</div>
  </div>
</div>

<div class="content">
  <div class="stats" id="stats"></div>
  <div id="superavit-wrap"></div>
  <div class="progress-wrap">
    <div class="progress-info"><span>Inscripción cubierta</span><span id="pct-label">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab(this,'todos')">Todos</div>
    <div class="tab" onclick="setTab(this,'pendientes')">Deben</div>
    <div class="tab" onclick="setTab(this,'pagados')">Pagaron</div>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Buscar jugador..." oninput="render()">
  </div>
  <div class="player-list" id="player-list"></div>
  <button class="action-btn accent" onclick="abrirAgregar()">＋ Agregar jugador</button>
  <button class="action-btn" onclick="abrirExportar()">↓ Exportar a Excel / CSV</button>
  <button class="action-btn" onclick="copiarResumen()">⎘ Copiar resumen para WhatsApp</button>
</div>

<!-- Bottom sheet overlay -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet-content"></div>
</div>

<script>
const CUOTA = 300;
const COSTO = 4700;
const KEY = 'lp_v2';

const DEFAULTS = ["Flaco","Fran","Cavi","Joaco","Marta","Sebi","Tico","Max","Colo","Santi Julian","Huevo","Edu","Herni","Tano","Tucu","Paco"].map((n,i)=>({id:i+1,nombre:n,pagos:[]}));

let data = {jugadores:[], idJ:17, idP:1};
let tab = 'todos';
let editandoPago = null; // {jugId, pagoId}

function guardar(){localStorage.setItem(KEY,JSON.stringify(data))}
function cargar(){
  try{const r=localStorage.getItem(KEY);if(r){data=JSON.parse(r);return}}catch(e){}
  data={jugadores:JSON.parse(JSON.stringify(DEFAULTS)),idJ:17,idP:1};
  guardar();
}

function ini(n){return n.trim().split(/\s+/).map(p=>p[0]).join('').slice(0,2).toUpperCase()}
function pagadoPor(j){return j.pagos.reduce((s,p)=>s+p.monto,0)}
function estado(j){const p=pagadoPor(j);return p<=0?'pendiente':p>=CUOTA?'pagado':'parcial'}
function eLabel(e){return e==='pagado'?'Pagó':e==='parcial'?'Parcial':'Debe'}
function fmt(n){return 'U$D '+Number(n).toLocaleString('es-AR')}
function fmtF(s){if(!s)return '';try{const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}catch(e){return s}}
function hoy(){return new Date().toISOString().slice(0,10)}

function setTab(btn,t){
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let lista=data.jugadores.filter(j=>j.nombre.toLowerCase().includes(q));
  if(tab==='pendientes')lista=lista.filter(j=>estado(j)!=='pagado');
  if(tab==='pagados')lista=lista.filter(j=>estado(j)==='pagado');

  const totalRec=data.jugadores.reduce((s,j)=>s+pagadoPor(j),0);
  const pagaron=data.jugadores.filter(j=>estado(j)==='pagado').length;
  const deben=data.jugadores.filter(j=>estado(j)!=='pagado').length;
  const pct=totalRec>0?Math.min(100,Math.round(totalRec/COSTO*100)):0;
  const sup=totalRec-COSTO;

  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total recaudado</div><div class="stat-val green">${fmt(totalRec)}</div></div>
    <div class="stat"><div class="stat-label">Falta para inscripción</div><div class="stat-val red">${fmt(Math.max(0,COSTO-totalRec))}</div></div>
    <div class="stat"><div class="stat-label">Pagaron su cuota</div><div class="stat-val">${pagaron} de ${data.jugadores.length}</div></div>
    <div class="stat"><div class="stat-label">Deben todavía</div><div class="stat-val">${deben}</div></div>`;

  document.getElementById('superavit-wrap').innerHTML=sup>0
    ?`<div class="superavit"><span class="superavit-label">📈 Superávit del equipo</span><span class="superavit-val">${fmt(sup)}</span></div>`:'';

  document.getElementById('pct-label').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  const el=document.getElementById('player-list');
  if(!lista.length){el.innerHTML='<div class="empty">Sin resultados</div>';return}
  el.innerHTML=lista.map(j=>{
    const e=estado(j),p=pagadoPor(j),ult=j.pagos.length?j.pagos[j.pagos.length-1]:null;
    return`<div class="player-card" onclick="abrirJugador(${j.id})">
      <div class="avatar ${e}">${ini(j.nombre)}</div>
      <div class="player-info">
        <div class="player-name">${j.nombre}</div>
        <div class="player-detail">${p>0?`${fmt(p)} de ${fmt(CUOTA)}`:ult?fmtF(ult.fecha):'Sin pagos'}</div>
      </div>
      <span class="badge ${e}">${eLabel(e)}</span>
    </div>`;
  }).join('');
}

// ---- FICHA DE JUGADOR ----
function abrirJugador(id){
  const j=data.jugadores.find(x=>x.id===id);
  renderSheet(sheetJugador(j));
  abrirOverlay();
}

function sheetJugador(j){
  const e=estado(j),p=pagadoPor(j),falta=Math.max(0,CUOTA-p);

  const histHTML=j.pagos.length
    ?j.pagos.slice().reverse().map(pg=>`
      <div class="hist-item" id="hi-${pg.id}">
        <div class="hist-item-info">
          <div class="hist-item-monto">${fmt(pg.monto)}</div>
          <div class="hist-item-det">${fmtF(pg.fecha)}${pg.nota?' · '+pg.nota:''}</div>
        </div>
        <div class="hist-actions">
          <button class="hist-edit-btn" onclick="abrirEditarPago(${j.id},${pg.id})">✏️ Editar</button>
          <button class="hist-del-btn" onclick="confirmarBorrarPago(${j.id},${pg.id})">🗑</button>
        </div>
      </div>`).join('')
    :'<div class="hist-empty">Sin pagos aún</div>';

  return`
    <div class="sheet-header">
      <div class="sheet-title">${j.nombre}</div>
      <button class="close-btn" onclick="cerrar()">✕</button>
    </div>
    <div class="mini-stats">
      <div class="mini-stat"><div class="label">Pagó</div><div class="val green">${fmt(p)}</div></div>
      <div class="mini-stat"><div class="label">Le falta</div><div class="val red">${fmt(falta)}</div></div>
    </div>
    ${e!=='pagado'?`
      <div class="form-label">Registrar nuevo pago</div>
      <input class="form-input" type="number" id="monto-in" placeholder="Monto (USD)" min="1" value="${falta}">
      <input class="form-input" type="date" id="fecha-in" value="${hoy()}">
      <input class="form-input" type="text" id="nota-in" placeholder="Nota (ej: efectivo, transferencia...)">
      <div class="btn-row">
        <button class="btn" onclick="cerrar()">Cancelar</button>
        <button class="btn primary" onclick="registrarPago(${j.id})">✓ Registrar pago</button>
      </div>
    `:`<div class="complete-box">✅ Cuota completa</div>`}
    <div class="divider"></div>
    <div class="hist-section">
      <div class="hist-title">Historial de pagos</div>
      <div id="hist-list">${histHTML}</div>
    </div>
    <div class="divider"></div>
    <button class="btn danger" style="width:100%;margin-top:4px" onclick="confirmarBorrarJugador(${j.id})">🗑 Eliminar jugador</button>`;
}

// ---- EDITAR PAGO ----
function abrirEditarPago(jugId, pagoId){
  const j=data.jugadores.find(x=>x.id===jugId);
  const pg=j.pagos.find(p=>p.id===pagoId);
  renderSheet(`
    <div class="sheet-header">
      <div class="sheet-title">Editar pago — ${j.nombre}</div>
      <button class="close-btn" onclick="abrirJugador(${jugId})">✕</button>
    </div>
    <div class="info-box">Modificá los datos del pago y tocá "Guardar cambios".</div>
    <div class="form-label">Monto (USD)</div>
    <input class="form-input" type="number" id="edit-monto" value="${pg.monto}" min="1">
    <div class="form-label">Fecha</div>
    <input class="form-input" type="date" id="edit-fecha" value="${pg.fecha}">
    <div class="form-label">Nota</div>
    <input class="form-input" type="text" id="edit-nota" value="${pg.nota||''}">
    <div class="btn-row">
      <button class="btn" onclick="abrirJugador(${jugId})">Cancelar</button>
      <button class="btn success" onclick="guardarEditPago(${jugId},${pagoId})">✓ Guardar cambios</button>
    </div>
    <button class="btn danger" style="width:100%;margin-top:10px" onclick="confirmarBorrarPago(${jugId},${pagoId})">🗑 Borrar este pago</button>
  `);
}

function guardarEditPago(jugId, pagoId){
  const monto=parseFloat(document.getElementById('edit-monto').value);
  const fecha=document.getElementById('edit-fecha').value;
  const nota=document.getElementById('edit-nota').value.trim();
  if(!monto||monto<=0){alert('Ingresá un monto válido');return}
  const j=data.jugadores.find(x=>x.id===jugId);
  const pg=j.pagos.find(p=>p.id===pagoId);
  pg.monto=monto; pg.fecha=fecha; pg.nota=nota;
  guardar(); abrirJugador(jugId); render();
}

// ---- BORRAR PAGO ----
function confirmarBorrarPago(jugId, pagoId){
  const j=data.jugadores.find(x=>x.id===jugId);
  const pg=j.pagos.find(p=>p.id===pagoId);
  renderSheet(`
    <div class="sheet-header">
      <div class="sheet-title">¿Borrar este pago?</div>
      <button class="close-btn" onclick="abrirJugador(${jugId})">✕</button>
    </div>
    <div class="hist-item" style="margin-bottom:16px">
      <div class="hist-item-info">
        <div class="hist-item-monto">${fmt(pg.monto)}</div>
        <div class="hist-item-det">${fmtF(pg.fecha)}${pg.nota?' · '+pg.nota:''}</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="abrirJugador(${jugId})">Cancelar</button>
      <button class="btn danger" onclick="ejecutarBorrarPago(${jugId},${pagoId})">Sí, borrar</button>
    </div>`);
}

function ejecutarBorrarPago(jugId, pagoId){
  const j=data.jugadores.find(x=>x.id===jugId);
  j.pagos=j.pagos.filter(p=>p.id!==pagoId);
  guardar(); abrirJugador(jugId); render();
}

// ---- BORRAR JUGADOR ----
function confirmarBorrarJugador(id){
  const j=data.jugadores.find(x=>x.id===id);
  renderSheet(`
    <div class="sheet-header">
      <div class="sheet-title">¿Eliminar jugador?</div>
      <button class="close-btn" onclick="abrirJugador(${id})">✕</button>
    </div>
    <div style="font-size:15px;margin-bottom:16px">Vas a eliminar a <strong>${j.nombre}</strong> y todos sus pagos.</div>
    <div class="btn-row">
      <button class="btn" onclick="abrirJugador(${id})">Cancelar</button>
      <button class="btn danger" onclick="ejecutarBorrarJugador(${id})">Sí, eliminar</button>
    </div>`);
}

function ejecutarBorrarJugador(id){
  data.jugadores=data.jugadores.filter(x=>x.id!==id);
  guardar(); cerrar(); render();
}

// ---- REGISTRAR PAGO ----
function registrarPago(id){
  const monto=parseFloat(document.getElementById('monto-in').value);
  const fecha=document.getElementById('fecha-in').value;
  const nota=document.getElementById('nota-in').value.trim();
  if(!monto||monto<=0){alert('Ingresá un monto válido');return}
  data.jugadores.find(x=>x.id===id).pagos.push({id:data.idP++,monto,fecha,nota});
  guardar(); cerrar(); render();
}

// ---- AGREGAR JUGADOR ----
function abrirAgregar(){
  renderSheet(`
    <div class="sheet-header">
      <div class="sheet-title">Nuevo jugador</div>
      <button class="close-btn" onclick="cerrar()">✕</button>
    </div>
    <div class="info-box">Su cuota será U$D ${CUOTA}. El superávit se actualiza automáticamente.</div>
    <div class="form-label">Nombre o apodo</div>
    <input class="form-input" type="text" id="nuevo-nombre" placeholder="Ej: Pichi">
    <div class="btn-row">
      <button class="btn" onclick="cerrar()">Cancelar</button>
      <button class="btn primary" onclick="agregarJugador()">Agregar</button>
    </div>`);
  abrirOverlay();
  setTimeout(()=>document.getElementById('nuevo-nombre').focus(),300);
}

function agregarJugador(){
  const nombre=document.getElementById('nuevo-nombre').value.trim();
  if(!nombre){alert('Ingresá un nombre');return}
  data.jugadores.push({id:data.idJ++,nombre,pagos:[]});
  guardar(); cerrar(); render();
}

// ---- EXPORTAR ----
function abrirExportar(){
  renderSheet(`
    <div class="sheet-header">
      <div class="sheet-title">Exportar datos</div>
      <button class="close-btn" onclick="cerrar()">✕</button>
    </div>
    <div class="export-info">
      📋 <strong>Cómo importar en Google Sheets:</strong><br>
      1. Tocá "Copiar CSV"<br>
      2. Abrí Google Sheets → creá una hoja nueva<br>
      3. Tocá en la celda A1 → pegá (mantené presionado → Pegar)<br>
      4. Menú: Datos → Dividir texto en columnas → coma<br><br>
      <strong>En Excel (computadora):</strong> pegá y usá Datos → Texto en columnas → Delimitado → Coma.
    </div>
    <div style="background:var(--gray-bg);border-radius:var(--r);padding:10px;font-size:11px;font-family:monospace;max-height:150px;overflow-y:auto;margin-bottom:12px;white-space:pre-wrap;word-break:break-all" id="csv-preview">${generarCSV()}</div>
    <button class="btn primary" style="width:100%" onclick="copiarCSV()">⎘ Copiar CSV</button>`);
  abrirOverlay();
}

function generarCSV(){
  const fecha=new Date().toLocaleDateString('es-AR');
  let csv=`LEONCIO PESCIA - Inscripcion al torneo\nFecha:,${fecha}\nCuota (USD):,${CUOTA}\nInscripcion total (USD):,${COSTO}\n\n`;
  csv+='Jugador,Estado,Pagado (USD),Falta (USD),N pagos,Detalle\n';
  data.jugadores.forEach(j=>{
    const p=pagadoPor(j),e=estado(j);
    const det=j.pagos.map(pg=>`${fmtF(pg.fecha)}:USD${pg.monto}${pg.nota?'('+pg.nota+')':''}`).join(' | ');
    csv+=`"${j.nombre}","${eLabel(e)}",${p},${Math.max(0,CUOTA-p)},${j.pagos.length},"${det}"\n`;
  });
  const tot=data.jugadores.reduce((s,j)=>s+pagadoPor(j),0);
  csv+=`\nTOTAL RECAUDADO,,${tot}\nCOSTO INSCRIPCION,,${COSTO}\nSUPERAVIT,,${tot-COSTO}`;
  return csv;
}

function copiarCSV(){
  navigator.clipboard.writeText(generarCSV())
    .then(()=>alert('✅ CSV copiado. Pegá en Google Sheets.'))
    .catch(()=>alert('Seleccioná el texto del cuadro y copialo manualmente.'));
}

function copiarResumen(){
  const fecha=new Date().toLocaleDateString('es-AR');
  const pagados=data.jugadores.filter(j=>estado(j)==='pagado').map(j=>j.nombre);
  const parciales=data.jugadores.filter(j=>estado(j)==='parcial').map(j=>`${j.nombre} (${fmt(pagadoPor(j))})`);
  const deben=data.jugadores.filter(j=>estado(j)==='pendiente').map(j=>j.nombre);
  const tot=data.jugadores.reduce((s,j)=>s+pagadoPor(j),0);
  const sup=tot-COSTO;
  let txt=`⚽ LEONCIO PESCIA — Inscripción al torneo\n${fecha}\n\n`;
  txt+=`✅ Cuota completa (${pagados.length}):\n${pagados.map(n=>`• ${n}`).join('\n')||'—'}\n\n`;
  txt+=`⚠️ Pago parcial (${parciales.length}):\n${parciales.map(n=>`• ${n}`).join('\n')||'—'}\n\n`;
  txt+=`❌ Sin pagar (${deben.length}):\n${deben.map(n=>`• ${n}`).join('\n')||'—'}\n\n`;
  txt+=`💰 Recaudado: ${fmt(tot)}\n🏆 Inscripción: ${fmt(COSTO)}\n`;
  txt+=sup>0?`📈 Superávit: ${fmt(sup)}`:`⏳ Falta: ${fmt(-sup)}`;
  navigator.clipboard.writeText(txt)
    .then(()=>alert('✅ Resumen copiado. Pegalo en WhatsApp.'))
    .catch(()=>alert(txt));
}

function cerrar(){document.getElementById('overlay').classList.remove('open')}

cargar();
render();
